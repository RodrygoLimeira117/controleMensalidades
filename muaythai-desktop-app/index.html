<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Mensalidades - Muay Thai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .table { --bs-table-bg: #1e1e1e; --bs-table-color: #fff; }
        .form-control { background-color: #2d2d2d; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #333; color: #fff; border-color: #ffc107; box-shadow: none; }
        .btn-warning { background-color: #ffc107; border: none; color: #000; }
        .btn-warning:hover { background-color: #e0a800; color: #000; }
    </style>
</head>
<body>

<div class="container my-5">
    <h1 class="text-center mb-5 text-warning fw-bold">CONTROLE DE MENSALIDADES - MUAY THAI</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4">
                <h4 class="mb-3 text-warning fw-bold">Matricular Aluno</h4>
                <form id="formAluno">
                    <div class="mb-3">
                        <label class="form-label">CPF (Apenas números)</label>
                        <input type="text" id="cpf" class="form-control" maxlength="11" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" id="nomeCompleto" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Celular (Com DDD e 55)</label>
                        <input type="text" id="celular" class="form-control" placeholder="Ex: 5581999999999" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Idade</label>
                        <input type="number" id="idade" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dia do Vencimento</label>
                        <input type="number" id="diaVencimento" class="form-control" min="1" max="31" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-2">Salvar Aluno</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h4 class="mb-3 text-warning fw-bold">Alunos Ativos</h4>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Celular</th>
                                <th>Vencimento</th>
                                <th>Último Pagamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaAlunos">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/alunos';

    // Listar alunos do Spring Boot
    async function carregarAlunos() {
        try {
            const response = await fetch(API_URL);
            const alunos = await response.json();
            const tabela = document.getElementById('tabelaAlunos');
            tabela.innerHTML = '';

            alunos.forEach(aluno => {
                const dataPagamento = aluno.ultimoPagamento ? new Date(aluno.ultimoPagamento).toLocaleDateString('pt-BR') : 'Pendente';
                const badgeClass = aluno.ultimoPagamento ? 'bg-success' : 'bg-danger';
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-bold">${aluno.nomeCompleto}</td>
                    <td>${aluno.celular}</td>
                    <td>Dia ${aluno.diaVencimento}</td>
                    <td><span class="badge ${badgeClass}">${dataPagamento}</span></td>
                    <td>
                        <button class="btn btn-success btn-sm fw-bold px-3" onclick="registrarPagamento('${aluno.cpf}')">Receber</button>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        } catch (error) {
            console.error('Erro ao conectar ao backend Java:', error);
        }
    }

    // Enviar dados para o Java
    document.getElementById('formAluno').addEventListener('submit', async (e) => {
        e.preventDefault();

        const aluno = {
            cpf: document.getElementById('cpf').value,
            nomeCompleto: document.getElementById('nomeCompleto').value,
            celular: document.getElementById('celular').value,
            idade: parseInt(document.getElementById('idade').value),
            diaVencimento: parseInt(document.getElementById('diaVencimento').value),
            ativo: true
        };

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(aluno)
            });

            if (response.ok) {
                document.getElementById('formAluno').reset();
                carregarAlunos();
            } else {
                alert('Erro ao cadastrar aluno.');
            }
        } catch (error) {
            alert('Servidor Java offline.');
        }
    });

    // Confirmar pagamento no Java
    async function registrarPagamento(cpf) {
        try {
            const response = await fetch(`${API_URL}/${cpf}/pagar`, { method: 'PUT' });
            if (response.ok) {
                carregarAlunos();
            }
        } catch (error) {
            alert('Erro ao processar pagamento.');
        }
    }

    // Inicializa a tabela
    carregarAlunos();
</script>
</body>
</html>
