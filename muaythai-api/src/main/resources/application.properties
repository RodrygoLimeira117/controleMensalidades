# Define a porta em que o backend vai rodar
server.port=8080

# ConfigurańŃo do banco de dados H2 (Salva em um arquivo local chamado 'tatamedb' na pasta raiz do projeto)
spring.datasource.url=jdbc:h2:file:~/banco_tatame;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin

# Pede para o Spring criar e atualizar as tabelas do banco automaticamente baseado nas suas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Habilita o console do banco no navegador (¾timo para testar e ver os dados)
spring.h2.console.enabled=true
spring.h2.console.path=/banco