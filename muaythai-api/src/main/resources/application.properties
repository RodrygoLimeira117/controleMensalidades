# Define a porta em que o backend vai rodar
server.port=8080

# Configuração do banco de dados H2 (Salva em um arquivo local chamado 'tatamedb' na pasta raiz do projeto)
spring.datasource.url=jdbc:h2:file:~/banco_tatame;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
# Prefira nao deixar credenciais fixas no codigo: use variaveis de ambiente com fallback para dev local
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}

# Pede para o Spring criar e atualizar as tabelas do banco automaticamente baseado nas suas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Habilita o console do banco no navegador (ótimo para testar e ver os dados)
spring.h2.console.enabled=true
spring.h2.console.path=/banco

# Integração com o muaythai-whatsapp-worker (Node.js)
worker.whatsapp.url=${WORKER_WHATSAPP_URL:http://localhost:3000/api/whatsapp/enviar}
worker.whatsapp.connect-timeout-ms=${WORKER_WHATSAPP_CONNECT_TIMEOUT_MS:3000}
worker.whatsapp.read-timeout-ms=${WORKER_WHATSAPP_READ_TIMEOUT_MS:5000}

# Valores da mensalidade (o app desktop busca esses valores em /api/config
# em vez de ter os números fixos no JavaScript)
mensalidade.valor-padrao=${MENSALIDADE_VALOR_PADRAO:70}
mensalidade.valor-primeiro-mes=${MENSALIDADE_VALOR_PRIMEIRO_MES:80}