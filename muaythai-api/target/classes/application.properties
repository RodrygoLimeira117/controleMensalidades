# Define a porta em que o backend vai rodar
server.port=8080

# Configuração do banco de dados (H2 em dev; PostgreSQL em produção/AWS via env vars)
# DB_URL permite apontar para outro caminho/banco em produção/Docker (ex.: um volume
# montado em /data para H2, ou uma instância RDS Postgres: jdbc:postgresql://host:5432/db)
spring.datasource.url=${DB_URL:jdbc:h2:file:~/banco_tatame;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
# Prefira nao deixar credenciais fixas no codigo: use variaveis de ambiente com fallback para dev local
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}

# O Flyway agora é o dono do schema (ver src/main/resources/db/migration).
# "validate" só confere se as entidades JPA batem com as tabelas criadas pelo Flyway;
# ele NUNCA cria/altera tabelas sozinho - isso evita divergência entre dev e produção.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true

# --- Flyway ---
# baseline-on-migrate=true: se o banco já existir com tabelas criadas por uma versão
# anterior (ddl-auto=update), o Flyway assume a V1 como "ponto de partida" em vez de
# falhar reclamando que as tabelas já existem. Em bancos novos (ex.: RDS vazio na AWS)
# isso não tem efeito - o Flyway aplica as migrations normalmente desde o início.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Habilita o console do banco no navegador (ótimo para testar e ver os dados)
# Em produção, considere definir H2_CONSOLE_ENABLED=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/banco

# Integração com o muaythai-whatsapp-worker (Node.js)
worker.whatsapp.url=${WORKER_WHATSAPP_URL:http://localhost:3000/api/whatsapp/enviar}
worker.whatsapp.connect-timeout-ms=${WORKER_WHATSAPP_CONNECT_TIMEOUT_MS:3000}
worker.whatsapp.read-timeout-ms=${WORKER_WHATSAPP_READ_TIMEOUT_MS:5000}

# Valores da mensalidade (padrão inicial: usado só para semear a configuração
# no primeiro start. Depois disso, quem manda é o que está salvo no banco,
# editável pela tela de Configurações do app.)
mensalidade.valor-novato=${MENSALIDADE_VALOR_NOVATO:80}
mensalidade.valor-veterano=${MENSALIDADE_VALOR_VETERANO:70}

# --- Autenticação (Spring Security + JWT) ---
# IMPORTANTE: defina JWT_SECRET no ambiente em produção (nunca use o valor padrão abaixo).
# Precisa ter pelo menos 32 caracteres (256 bits) para o algoritmo HS256.
jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-use-uma-chave-aleatoria-longa-32+}
# Tempo de expiração do token em milissegundos (padrão: 8 horas)
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# Usuário administrador criado automaticamente no primeiro start, se o banco
# de usuários estiver vazio. Troque a senha padrão / defina essas variáveis em produção.
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# --- Actuator (usado pelo healthcheck do Docker) ---
# Expõe só /actuator/health; sem detalhes sensíveis e sem os outros endpoints do actuator.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never